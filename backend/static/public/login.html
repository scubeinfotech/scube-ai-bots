<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SCUBE AI</title>
    <script>if(localStorage.getItem('theme')==='light')document.documentElement.setAttribute('data-theme','light')</script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/theme.css">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); }
        .glass { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); }
        .input-focus:focus { outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,0.3); border-color: #6366f1; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(99,102,241,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">

<div class="min-h-screen flex flex-col" x-data="loginForm()" x-cloak>

    <!-- Header -->
    <header class="border-b border-white/10">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="javascript:void(0);" class="flex items-center gap-3">
                <img src="/static/logo.svg" alt="AI CHATBOT Logo" class="h-10 w-auto"/>
                <span class="text-xl font-bold ml-2">SUBCE AI - CHATBOT</span>
            </a>
            <div class="flex items-center gap-4 text-sm">
                <button @click="toggleTheme()" class="p-1.5 rounded-lg hover:bg-white/5 text-gray-400 hover:text-white transition" title="Toggle theme">
                    <svg x-show="theme === 'dark'" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <svg x-show="theme === 'light'" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </button>
                <a href="/public/pricing" class="text-gray-300 hover:text-white transition">Pricing</a>
                <a href="/public/register" class="text-gray-300 hover:text-white transition">Sign Up</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">

            <!-- Login Form -->
            <div x-show="!loggedIn && !showTenantPicker">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
                    <p class="text-gray-400">Sign in to your SCUBE AI dashboard</p>
                </div>

                <div class="glass rounded-2xl p-8 space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                        <input type="email" x-model="form.email" @input="clearError()"
                            placeholder="you@company.com"
                            class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 input-focus transition">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                        <input type="password" x-model="form.password" @keyup.enter="submit()"
                            placeholder="Enter your password"
                            class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 input-focus transition">
                    </div>

                    <div x-show="error" class="p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm" x-text="error"></div>

                    <!-- Google OAuth -->
                    <a href="/api/public/auth/google"
                        class="w-full flex items-center justify-center gap-3 py-3 px-4 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 text-white font-medium transition">
                        <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        <span>Sign in with Google</span>
                    </a>

                    <div class="flex items-center gap-3">
                        <div class="flex-1 h-px bg-white/10"></div>
                        <span class="text-sm text-gray-500">or</span>
                        <div class="flex-1 h-px bg-white/10"></div>
                    </div>

                    <button @click="submit()" :disabled="loading"
                        class="w-full btn-primary py-3.5 rounded-xl font-semibold text-white flex items-center justify-center gap-2">
                        <div x-show="loading" class="spinner"></div>
                        <span x-text="loading ? 'Signing in...' : 'Sign In →'"></span>
                    </button>

                    <div class="text-center">
                        <button @click="showForgot = true" class="text-sm text-indigo-400 hover:text-indigo-300">Forgot password?</button>
                    </div>
                </div>

                <p class="text-center text-sm text-gray-400 mt-6">
                    Don't have an account?
                    <a href="/public/register" class="text-indigo-400 hover:text-indigo-300 font-medium">Start free trial</a>
                </p>
            </div>

            <!-- Tenant Picker -->
            <div x-show="showTenantPicker" x-transition>
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold mb-2">Select Business</h1>
                    <p class="text-gray-400">You have multiple businesses under this account.</p>
                </div>

                <div class="glass rounded-2xl p-6 space-y-3">
                    <template x-for="t in tenants" :key="t.tenant_id">
                        <button @click="selectTenant(t)"
                            class="w-full text-left p-4 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 hover:border-indigo-500/30 transition-all flex items-center justify-between group">
                            <div>
                                <div class="font-medium text-white" x-text="t.tenant_name"></div>
                                <div class="text-xs text-gray-400 mt-1">
                                    <span x-text="t.subscription_plan"></span>
                                    <span x-show="t.trial_ends_at" class="ml-2">Trial ends <span x-text="new Date(t.trial_ends_at).toLocaleDateString()"></span></span>
                                </div>
                            </div>
                            <svg class="w-5 h-5 text-indigo-400 opacity-0 group-hover:opacity-100 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                        </button>
                    </template>
                </div>

                <button @click="showTenantPicker = false; loggedIn = false" class="mt-4 text-sm text-gray-500 hover:text-gray-300 transition">
                    &larr; Sign in with a different account
                </button>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/10 py-6 text-center text-sm text-gray-500">
        &copy; 2026 SCUBE AI. Intelligent chatbots for every business.
    </footer>
</div>

<script>
function loginForm() {
    return {
        theme: localStorage.getItem('theme') || 'dark',
        form: { email: '', password: '' },
        error: '',
        loading: false,
        showForgot: false,
        loggedIn: false,
        showTenantPicker: false,
        tenants: [],

        toggleTheme() {
            this.theme = this.theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', this.theme);
            if (this.theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        },

        clearError() { this.error = ''; },

        async submit() {
            this.error = '';
            if (!this.form.email || !this.form.password) {
                this.error = 'Please enter your email and password.';
                return;
            }

            this.loading = true;
            try {
                const resp = await fetch('/api/public/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.form)
                });

                const data = await resp.json();

                if (!resp.ok) {
                    this.error = data.detail || 'Login failed. Please try again.';
                    return;
                }

                // Store token and tenant info (unified)
                localStorage.setItem('tenant_token', data.token);
                localStorage.setItem('tenant_email', data.email);
                if (data.tenants.length === 1) {
                    // Single tenant — auto-redirect
                    const t = data.tenants[0];
                    localStorage.setItem('tenant_id', t.tenant_id);
                    localStorage.setItem('tenant_name', t.tenant_name);
                    localStorage.setItem('tenant_slug', t.tenant_slug);
                    window.location.href = t.dashboard_url;
                } else {
                    // Multiple tenants — show picker
                    this.tenants = data.tenants;
                    this.loggedIn = true;
                    this.showTenantPicker = true;
                }
            } catch (err) {
                this.error = 'Network error. Please try again.';
            } finally {
                this.loading = false;
            }
        },

        async selectTenant(t) {
            try {
                const resp = await fetch('/api/public/switch-tenant', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('tenant_token')}`
                    },
                    body: JSON.stringify({ tenant_id: t.tenant_id })
                });
                if (!resp.ok) {
                    this.error = 'Failed to switch tenant. Please try again.';
                    return;
                }
                const data = await resp.json();
                localStorage.setItem('tenant_token', data.token);
                localStorage.setItem('tenant_id', data.tenant_id);
                localStorage.setItem('tenant_name', data.tenant_name);
                localStorage.setItem('tenant_slug', data.tenant_slug);
                window.location.href = data.dashboard_url;
            } catch {
                this.error = 'Network error. Please try again.';
            }
        }
    };
}
</script>

</body>
</html>
