<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <style>
      .brand-text { fill: #1a202c; font-family: 'Arial Black', Arial, sans-serif; font-weight: 900; }
      .brand-sub { fill: #2563eb; font-family: 'Arial Black', Arial, sans-serif; font-weight: 900; }
      .tagline { fill: #1a202c; font-family: Arial, sans-serif; font-weight: 700; font-size: 38px; letter-spacing: 2px; }
    </style>
  </defs>
  
  <!-- Icon: Stopwatch with Person (Hollow/Outline Style) -->
  <g transform="translate(100, 100)">
    <!-- Stopwatch button on top -->
    <rect x="145" y="15" width="50" height="25" rx="6" fill="none" stroke="#2563eb" stroke-width="8"/>
    <circle cx="170" cy="27.5" r="6" fill="#2563eb"/>
    
    <!-- Main stopwatch body - HOLLOW/OUTLINE -->
    <circle cx="170" cy="180" r="120" stroke="#2563eb" stroke-width="18" fill="none"/>
    
    <!-- Clock face markers (dots) -->
    <circle cx="170" cy="80" r="8" fill="#2563eb"/>
    <circle cx="250" cy="180" r="8" fill="#2563eb"/>
    <circle cx="90" cy="180" r="8" fill="#2563eb"/>
    <circle cx="170" cy="280" r="8" fill="#2563eb"/>
    
    <!-- Checkmark hand -->
    <path d="M 145 160 L 165 185 L 200 155" stroke="#1e3a8a" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Person icon at bottom - HOLLOW -->
    <circle cx="170" cy="260" r="20" fill="none" stroke="#2563eb" stroke-width="8"/>
    <path d="M 140 285 Q 140 305 150 315 L 150 325 L 190 325 L 190 315 Q 200 305 200 285" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Side handles/lugs - HOLLOW -->
    <circle cx="75" cy="140" r="15" fill="none" stroke="#2563eb" stroke-width="8"/>
    <circle cx="75" cy="220" r="15" fill="none" stroke="#2563eb" stroke-width="8"/>
    <circle cx="265" cy="140" r="15" fill="none" stroke="#2563eb" stroke-width="8"/>
    <circle cx="265" cy="220" r="15" fill="none" stroke="#2563eb" stroke-width="8"/>
  </g>
  
  <!-- Text: CHRONO -->
  <text x="450" y="280" class="brand-text" font-size="120">CHRONO</text>
  
  <!-- Text: BILL -->
  <text x="450" y="390" class="brand-sub" font-size="120">BILL</text>
  
  <!-- Tagline -->
  <text x="450" y="470" class="tagline">TRACK TIME. BILL SMART.</text>
</svg>
