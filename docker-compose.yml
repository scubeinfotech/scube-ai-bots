services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: llm-postgres
    environment:
      POSTGRES_DB: llm_chatbot
      POSTGRES_USER: llmuser
      POSTGRES_PASSWORD: changeme123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmuser"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - llm-network

  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm-api
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://llmuser:changeme123@postgres:5432/llm_chatbot
      OLLAMA_URL: http://host.docker.internal:11434
      # Embedding configuration. Default model is BAAI/bge-m3 (multilingual,
      # 1024-dim, top-tier quality, free). Override EMBEDDING_PROVIDER /
      # EMBEDDING_MODEL in backend/.env to switch to OpenAI or Ollama.
      EMBEDDING_PROVIDER: bge
      EMBEDDING_MODEL: BAAI/bge-m3
      HF_HOME: /root/.cache/huggingface
      API_SECRET_KEY: dev-secret-key-change-in-prod
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      # Persist the downloaded HuggingFace model so it isn't re-pulled on
      # every container restart (~2 GB for bge-m3).
      - hf_cache:/root/.cache/huggingface
    networks:
      - llm-network
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

# Redis for caching - disabled (use external timesheet-redis-1 if needed)
  redis:
    image: redis:7-alpine
    container_name: llm-redis
    networks:
      - llm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

networks:
  llm-network:
    driver: bridge

volumes:
  postgres_data:
  hf_cache:
